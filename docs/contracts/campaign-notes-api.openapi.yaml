openapi: 3.1.2
info:
  title: World of Aletheia Campaign Notes API
  version: 0.3.1
  summary: Read-only contract for campaign-scoped notes indexed from Campaign Content Buckets.
  description: >-
    Campaign Notes V1 is read-only from the HTTP API perspective. Notes are authored in a
    campaign Obsidian vault, synced to that campaign's Campaign Content Bucket, scanned by
    woa-admin, and exposed only after D1 current-index validation. Website live editing,
    write sessions, upload endpoints, D1 revision history, D1 audit streams, and D1 scanner
    diagnostics are deferred.

    The Campaign Content Bucket is the campaign/environment storage boundary. Campaign Notes
    sourcePath values are bucket-relative object keys. For V1, Campaign Notes objects live at
    notes/{documentId}.md inside the resolved Campaign Content Bucket.

    Reads may be anonymous or authenticated by signed runtime actor assertion. Anonymous reads
    expose only public notes after publication/environment gates. Authenticated reads require
    both x-woa-runtime-actor and x-woa-runtime-signature; the signed actor assertion supplies the
    user, campaign, role, operation, audience, and expiry that woa-admin verifies before applying
    campaignMembers or gm visibility.
servers:
  - url: https://admin.worldofaletheia.com
    description: woa-admin origin.
tags:
  - name: Campaign Notes Documents
paths:
  /api/v1/campaigns/{campaignSlug}/notes/documents:
    get:
      operationId: listCampaignNoteDocuments
      tags: [Campaign Notes Documents]
      summary: List readable campaign note metadata
      description: >-
        Lists Campaign Notes from the D1 current index. The endpoint returns only notes the
        caller is allowed to read after publication and visibility gates are applied. Filters
        narrow the already-authorized result set and never expand access. The endpoint does
        not scan R2 live; synced notes are invisible until scanner/indexer reconciliation.
        Calls with no runtime assertion are anonymous and can return only public notes. Calls
        with a valid signed runtime actor assertion may return campaignMembers or gm notes
        according to the asserted role after membership verification. Production reads expose
        publish notes only; preview reads expose preview and publish notes.
      security:
        - {}
        - RuntimeActorAssertion: []
          RuntimeActorSignature: []
      parameters:
        - $ref: '#/components/parameters/CampaignSlug'
        - $ref: '#/components/parameters/TitleQuery'
        - $ref: '#/components/parameters/AuthorQuery'
        - $ref: '#/components/parameters/TypeQuery'
        - $ref: '#/components/parameters/SessionSlugQuery'
        - $ref: '#/components/parameters/SessionDateQuery'
        - $ref: '#/components/parameters/LimitQuery'
        - $ref: '#/components/parameters/CursorQuery'
      responses:
        '200':
          description: Readable note metadata page.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DocumentPage'
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '429': { $ref: '#/components/responses/TooManyRequests' }
        '503': { $ref: '#/components/responses/ServiceUnavailable' }
  /api/v1/campaigns/{campaignSlug}/notes/documents/{documentId}:
    get:
      operationId: getCampaignNoteDocument
      tags: [Campaign Notes Documents]
      summary: Read one campaign note
      description: >-
        Reads one indexed, authorized Campaign Note. The source Markdown is read from the
        D1-indexed bucket-relative sourcePath in the resolved Campaign Content Bucket. This
        endpoint does not scan R2 live and does not expose unindexed objects. Calls with no
        runtime assertion are anonymous and can read only public notes. Calls with a valid
        signed runtime actor assertion may read campaignMembers or gm notes according to the
        asserted role after membership verification. Production reads expose publish notes only;
        preview reads expose preview and publish notes.
      security:
        - {}
        - RuntimeActorAssertion: []
          RuntimeActorSignature: []
      parameters:
        - $ref: '#/components/parameters/CampaignSlug'
        - $ref: '#/components/parameters/DocumentId'
      responses:
        '200':
          description: Current note document and Markdown body.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DocumentDetail'
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '503': { $ref: '#/components/responses/ServiceUnavailable' }
components:
  securitySchemes:
    RuntimeActorAssertion:
      type: apiKey
      in: header
      name: x-woa-runtime-actor
      description: >-
        Base64url JSON runtime actor assertion. Required together with
        x-woa-runtime-signature for authenticated reads. The decoded JSON payload must match
        RuntimeActorAssertionPayload. Use no runtime actor headers for anonymous public-only
        reads.
    RuntimeActorSignature:
      type: apiKey
      in: header
      name: x-woa-runtime-signature
      description: >-
        Base64url HMAC-SHA256 signature of the exact x-woa-runtime-actor header value using
        the matching environment's CAMPAIGN_NOTES_RUNTIME_ASSERTION_SECRET. Required together
        with x-woa-runtime-actor for authenticated reads. If either runtime actor header is
        present, both must be present and valid.
  parameters:
    CampaignSlug:
      name: campaignSlug
      in: path
      required: true
      schema: { type: string, pattern: '^[a-z0-9][a-z0-9-]*[a-z0-9]$' }
    DocumentId:
      name: documentId
      in: path
      required: true
      description: >-
        Immutable Campaign Notes document id, equal to the Markdown filename stem and
        frontmatter documentId. Convention: {YYYYMMDDHHmmss}-{titleSlug}. The timestamp is
        derived from createdAt in UTC. titleSlug reflects the creation-time title only and is
        not updated when the title changes.
      schema: { type: string, minLength: 1, maxLength: 128, pattern: '^[0-9]{14}-[a-z0-9][a-z0-9-]*$' }
    TitleQuery:
      name: title
      in: query
      description: Case-insensitive substring filter on current note title.
      schema: { type: string, minLength: 1, maxLength: 200 }
    AuthorQuery:
      name: author
      in: query
      description: Exact canonical Better Auth user id author filter.
      schema: { type: string, minLength: 1 }
    TypeQuery:
      name: type
      in: query
      schema: { $ref: '#/components/schemas/NoteType' }
    SessionSlugQuery:
      name: sessionSlug
      in: query
      schema: { type: string, minLength: 1, maxLength: 80 }
    SessionDateQuery:
      name: sessionDate
      in: query
      schema: { type: string, format: date }
    LimitQuery:
      name: limit
      in: query
      schema: { type: integer, minimum: 1, maximum: 100, default: 50 }
    CursorQuery:
      name: cursor
      in: query
      schema: { type: string, maxLength: 512 }
  schemas:
    RuntimeActorAssertionPayload:
      type: object
      description: >-
        Decoded JSON payload carried by x-woa-runtime-actor before base64url encoding. The
        sibling x-woa-runtime-signature header signs the encoded payload. woa-admin verifies
        the audience, expiry, exact requested campaign, allowed operation, and that the asserted
        role still matches campaign_memberships for the asserted user and campaign. The public
        site remains responsible for its own Better Auth authn/authz before minting this
        server-side assertion.
      required: [aud, exp, campaignSlug, userId, role, operation]
      properties:
        aud:
          type: string
          const: woa-admin:campaign-notes:v1
          description: Runtime assertion audience expected by woa-admin.
        exp:
          type: integer
          minimum: 1
          description: Unix timestamp in seconds. Expired assertions are rejected.
        campaignSlug:
          type: string
          pattern: '^[a-z0-9][a-z0-9-]*[a-z0-9]$'
          description: Must exactly match the campaignSlug path parameter.
        userId:
          type: string
          minLength: 1
          description: Canonical Better Auth user id for the already-authenticated actor.
        role:
          type: string
          enum: [member, gm]
          description: Must match the actor's current campaign_memberships role for this campaign.
        operation:
          type: string
          enum: [notes:read]
          description: Must be allowed by the target endpoint. Campaign Notes read endpoints accept notes:read.
      additionalProperties: false
    NoteType:
      type: string
      enum: [session-note, campaign-note, gm-note, recap, downtime-note]
      description: V1 Campaign Notes note subtypes. Type is mutable frontmatter metadata.
    Publication:
      type: string
      enum: [preview, publish, archive]
      description: Authored lifecycle state. Normal production reads expose publish only.
    ContentState:
      type: string
      enum: [stable, mayChange, unfinished]
      default: stable
    Visibility:
      type: string
      enum: [public, campaignMembers, gm]
      description: Audience class applied after publication/environment gates.
    AudienceWarning:
      type: string
      enum: [gmSpoilers]
    Authors:
      type: array
      minItems: 1
      maxItems: 50
      uniqueItems: true
      items: { type: string, minLength: 1 }
      description: >-
        Unordered set of canonical Better Auth user ids identifying note authors. Order is not
        semantically significant; responses may canonicalize order. Every author must be a
        member of the exact campaign.
    FrontmatterContract:
      type: object
      description: >-
        Authoritative Campaign Notes Markdown frontmatter. Folder placement must match
        collection placement: Campaign Notes live under notes/. collection must be
        campaignNotes; campaign must match the campaign being indexed/read; documentId must
        match the filename stem; authors contains canonical Better Auth user ids. createdAt and
        updatedAt are RFC3339 timestamps. The documentId timestamp segment must equal createdAt
        formatted as UTC YYYYMMDDHHmmss. audienceWarnings containing gmSpoilers is valid only
        when visibility is gm. sessionSlug and sessionDate are required when type is
        session-note.
      required: [collection, campaign, documentId, type, title, publication, visibility, authors, createdAt, updatedAt]
      properties:
        collection: { type: string, const: campaignNotes }
        campaign: { type: string }
        documentId: { type: string }
        type: { $ref: '#/components/schemas/NoteType' }
        title: { type: string, minLength: 1, maxLength: 200 }
        publication: { $ref: '#/components/schemas/Publication' }
        contentState: { $ref: '#/components/schemas/ContentState' }
        visibility: { $ref: '#/components/schemas/Visibility' }
        authors: { $ref: '#/components/schemas/Authors' }
        audienceWarnings:
          type: array
          items: { $ref: '#/components/schemas/AudienceWarning' }
          default: []
        sessionSlug: { type: string, minLength: 1, maxLength: 80 }
        sessionDate: { type: string, format: date }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
      additionalProperties: true
    DocumentMetadata:
      type: object
      required: [documentId, title, type, authors, createdAt, updatedAt]
      properties:
        documentId: { type: string }
        title: { type: string }
        type: { $ref: '#/components/schemas/NoteType' }
        authors: { $ref: '#/components/schemas/Authors' }
        sessionSlug: { type: [string, 'null'] }
        sessionDate: { type: [string, 'null'], format: date }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
    DocumentPage:
      type: object
      required: [campaignSlug, items, nextCursor]
      properties:
        campaignSlug: { type: string }
        items: { type: array, items: { $ref: '#/components/schemas/DocumentMetadata' } }
        nextCursor: { type: [string, 'null'] }
    DocumentDetail:
      allOf:
        - $ref: '#/components/schemas/DocumentMetadata'
        - type: object
          required: [body]
          properties:
            body:
              type: string
              description: >-
                Markdown source body for rendering. Exact metadata/body shaping remains subject
                to the response metadata review in docs/todos/campaign-content-buckets.md.
    Error:
      type: object
      required: [error, message]
      properties:
        error: { type: string }
        message: { type: string }
        requestId: { type: string }
  responses:
    BadRequest:
      description: Invalid request.
      content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } }
    Unauthorized:
      description: Missing or invalid assertion.
      content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } }
    Forbidden:
      description: Authenticated actor is not allowed.
      content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } }
    NotFound:
      description: Resource not found or not readable.
      content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } }
    TooManyRequests:
      description: Rate limited.
      content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } }
    ServiceUnavailable:
      description: D1, R2, or dependent service unavailable.
      content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } }
